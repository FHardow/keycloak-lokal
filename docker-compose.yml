services:                                                                                                                                      
    traefik:                                                                                                                                     
      image: traefik:v3                                                                                                                          
      command:                                                                                                                                   
        - --providers.docker=true                                                                                                                
        - --providers.docker.exposedbydefault=false                                                                                              
        - --providers.docker.network=traefik-public                                                                                              
        - --entrypoints.web.address=:80
        - --entrypoints.web.http.redirections.entrypoint.to=websecure                                                                            
        - --entrypoints.web.http.redirections.entrypoint.scheme=https                                                                            
        - --entrypoints.websecure.address=:443
        - --certificatesresolvers.letsencrypt.acme.tlschallenge=true                                                                             
        - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}                                                                           
        - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      ports:                                                                                                                                     
        - "80:80" 
        - "443:443"                                                                                                                              
      volumes:    
        - /var/run/docker.sock:/var/run/docker.sock:ro
        - letsencrypt:/letsencrypt                                                                                                               
      networks:
        - traefik-public                                                                                                                         
      restart: unless-stopped

    keycloak:
      image: quay.io/keycloak/keycloak:26.0
      command: start-dev --import-realm
      environment:                                                                                                                               
        KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
        KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}                                                                               
        KC_DB: postgres
        KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
        KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}                                                                                              
        KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
        KC_HTTP_PORT: 8080                                                                                                                       
        KC_HOSTNAME: ${KC_HOSTNAME}                                                                                                              
        KC_HTTP_ENABLED: "true"
        KC_PROXY_HEADERS: xforwarded                                                                                                             
      labels:     
        - traefik.enable=true                                                                                                                    
        - traefik.http.routers.keycloak.rule=Host(`${KC_HOSTNAME}`)
        - traefik.http.routers.keycloak.entrypoints=websecure                                                                                    
        - traefik.http.routers.keycloak.tls.certresolver=letsencrypt
        - traefik.http.services.keycloak.loadbalancer.server.port=8080                                                                           
      ports:
        - "8180:8080"                                                                                                                            
      volumes:                                                                                                                                   
        - ./realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      networks:                                                                                                                                  
        - traefik-public
        - keycloak-internal
      depends_on:
        keycloak-db:
          condition: service_healthy                                                                                                             
      restart: unless-stopped
                                                                                                                                                 
    keycloak-db:  
      image: postgres:18
      environment:
        POSTGRES_DB: keycloak
        POSTGRES_USER: ${KC_DB_USERNAME:-keycloak}
        POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak}                                                                                           
      volumes:
        - keycloak_pgdata:/var/lib/postgresql/data                                                                                               
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U keycloak"]
        interval: 5s                                                                                                                             
        timeout: 5s
        retries: 5                                                                                                                               
      networks:   
        - keycloak-internal
      restart: unless-stopped
                                                                                                                                                 
  networks:
    traefik-public:                                                                                                                              
      name: traefik-public
    keycloak-internal:

  volumes:
    letsencrypt:
    keycloak_pgdata:

